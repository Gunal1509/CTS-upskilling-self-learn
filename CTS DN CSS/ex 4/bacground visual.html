<!DOCTYPE html>
<html>
<head>
    <title>Color & Background Styling</title>

    <style>
        body{
            background-color: #dcdcdc;
            background-image: url("wallpaper.jpg");
            background-size: cover;
        }
        h1{
            color: #003366;
            text-align: center;
        }
        .section{
            background-color: rgba(0, 128, 255, 0.3); 
            padding: 15px;
            margin: 20px;
        }
        .header{
            background: linear-gradient(to right, blue, lightblue);
            color: white;
            padding: 10px;
        }
    </style>
</head>

<body>

    <h1>Local Community Event Portal</h1>

    <div class="section">

        <h2 class="header">America cultural festival</h2>

        <p>shown in the background</p>

    </div>

</body>
</html>
