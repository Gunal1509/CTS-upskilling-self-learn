<!DOCTYPE html>
<html>
<head>
    <title>Typography Example</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body{
            font-family: 'Poppins', sans-serif;
            margin: 20px;
        }
        h1{
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            text-transform: uppercase;
        }b
        h2{
            font-size: 24px;
            font-style: italic;
            font-weight: 400;
        }
        p{
            font-size: 18px;
            text-align: justify;
            letter-spacing: 1px;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <h1>Local Community Event Portal</h1>
    <h2>Upcoming Events</h2>
    <p>
        Welcome to our community event portal. Explore workshops,
        cultural programs, sports events, and activities happening
        in your area. Stay connected and participate in community
        development programs.
    </p>
</body>
</html>
